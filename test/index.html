<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta http-equiv="Content-Type" content="text/html;charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Robot economic infrastructure | robonomics.network</title>
    <script src="https://cdn.jsdelivr.net/npm/vue/dist/vue.js"></script>
  </head>
  <body>


    <div id="app">
        <grid-points></grid-points>
    </div>

    <script type="text/javascript">
        Vue.component('grid-points', {
          
          props: {
            r: {
              type: Number,
              default: 4
            },
            fill: {
              type: String,
              default: '#cccccc'
            },
            dx: {
              type: Number,
              default: 80
            },
            dy: {
              type: Number,
              default: 80
            },
            width:{
              type: String,
              default: '100%'
            },
            height:{
              type: String,
              default: '100%'
            },
            // viewBox: String,
            points: Object
          },

          methods: {
            calcSide(side, step){
              let rem = side % (this.r * 2 + step);



              if ( rem != 0){
                return (side - rem) + this.r * 2;
              }
              else
                return side;
              
              // if ( rem != 0)
              //   return (side - rem) + this.r * 2;
              // else
              //   return side;
            },
            getPoints (w, h){
              let a = [];
              for (var x = this.r; x < w; x += (this.dx + this.r)) {
                for(var y = this.r; y < h; y += (this.dy + this.r )){
                  a.push({x, y});
                }
              }
              return a;
            }
          },

          mounted() {

            let w = this.calcSide(this.$el.clientWidth, this.dx);
            let h = this.calcSide(this.$el.clientHeight, this.dy);

            this.width = w + 'px';
            this.height = h + 'px';
            // this.viewBox = '0 0 '+ w + ' ' + h;


            this.points = this.getPoints(w, h);

            // console.log(this.points.x.length);
          },

          template: `<svg :width="width" :height="height" style="border: 1px solid red;">
            <circle v-for="(point,i) in points" :cx="point.x" :cy="point.y" :fill="fill" :r="r"></circle>
          </svg>`
        });

        new Vue({
            el: '#app'
        });
    </script>


  </body>
  </html>
